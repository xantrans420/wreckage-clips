<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LEAN.SYS</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#050505" />
<style>
  :root{
    --bg:#050505; --surface:#0c0c0c; --surface2:#111; --line:#242424; --line2:#3a3a3a;
    --text:#e8e8e8; --dim:#8a8a8a; --faint:#555; --accent:#ff5a00;
    --good:#4bd66b; --warn:#e0b020; --bad:#e0432a;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,"DejaVu Sans Mono","Roboto Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;display:flex;flex-direction:column}
  input,textarea,select,button{font-family:var(--mono);color:var(--text)}
  a{color:var(--accent)}

  /* header */
  header.app{flex:0 0 auto;padding:12px 14px 10px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--bg);z-index:5}
  .title{color:var(--accent);font-size:18px;font-weight:700;letter-spacing:2px}
  .pills{display:flex;gap:6px}
  .pill{border:1px solid var(--line);background:var(--surface2);color:var(--dim);font-size:10px;font-weight:700;
    letter-spacing:1px;padding:6px 11px;cursor:pointer}
  .pill[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--bg)}

  main.screen{flex:1 1 auto;overflow-y:auto;padding:14px;max-width:560px;width:100%;margin:0 auto}
  .sub{color:var(--dim);font-size:11px;letter-spacing:.5px;margin:-2px 0 12px}

  .label{color:var(--dim);font-size:10px;letter-spacing:1.6px;text-transform:uppercase}
  .faint{color:var(--faint);font-size:10px;line-height:1.6}
  .dim{color:var(--dim)}
  .card{background:var(--surface);border:1px solid var(--line);padding:15px;margin-bottom:12px}
  .card.accent{border-color:var(--accent)}
  .divider{height:1px;background:var(--line);margin:14px 0}

  .hero-num{display:flex;align-items:flex-end;gap:8px;margin-top:4px}
  .hero-num b{color:var(--accent);font-size:58px;font-weight:700;line-height:.95;font-variant-numeric:tabular-nums}
  .hero-num b.done{color:var(--good)}
  .hero-num .u{color:var(--dim);font-size:20px;margin-bottom:8px}
  .hero-sub{color:var(--dim);font-size:11px;letter-spacing:1px;margin-top:6px}

  .bar{height:8px;background:var(--surface2);border:1px solid var(--line);margin-top:10px}
  .bar>i{display:block;height:100%;background:var(--accent)}
  .bar.muted>i{background:var(--dim)} .bar.over>i{background:var(--bad)}

  .stats{display:flex;gap:12px} .stat{flex:1}
  .stat .k{color:var(--dim);font-size:10px;letter-spacing:1.4px;text-transform:uppercase}
  .stat .v{font-size:22px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .stat .v small{font-size:12px;color:var(--dim);font-weight:400}
  .v.accent{color:var(--accent)} .v.good{color:var(--good)} .v.warn{color:var(--warn)} .v.bad{color:var(--bad)}

  .rowline{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px}
  .rowline:last-child{border-bottom:0}
  .rowline .p{color:var(--accent);width:46px;text-align:right;font-variant-numeric:tabular-nums}
  .del{color:var(--bad);font-size:10px;letter-spacing:1px;cursor:pointer;border:1px solid var(--bad);padding:3px 6px;background:transparent}

  input,textarea,select{background:var(--surface2);border:1px solid var(--line);padding:9px 10px;font-size:14px;width:100%}
  input::placeholder,textarea::placeholder{color:var(--faint)}
  input:focus,textarea:focus,select:focus{outline:1px solid var(--accent)}
  .field{flex:1} .field .label{display:block;margin-bottom:4px}
  .row{display:flex;gap:8px;align-items:flex-end}

  .btn{display:block;width:100%;text-align:center;border:1px solid var(--line2);background:var(--surface2);
    font-size:12px;letter-spacing:1px;padding:12px;cursor:pointer;text-transform:uppercase}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700}
  .btn.ghost{background:transparent;border-color:var(--line)}
  .btn.danger{background:transparent;border-color:var(--bad);color:var(--bad)}
  .btn:disabled{opacity:.35;cursor:default}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{border:1px solid var(--line2);background:var(--surface2);padding:8px 10px;cursor:pointer;text-align:left}
  .chip b{font-size:12px;font-weight:400} .chip span{display:block;color:var(--dim);font-size:10px;margin-top:2px}

  .tabs3{display:flex;gap:5px;margin:12px 0}
  .tabs3 button{flex:1;border:1px solid var(--line);background:var(--surface2);color:var(--dim);font-size:10px;font-weight:700;
    letter-spacing:1px;padding:9px 0;cursor:pointer}
  .tabs3 button[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--bg)}

  .ex{border:1px solid var(--line);background:var(--surface);padding:12px;margin-bottom:10px}
  .ex .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ex .name{font-weight:700;font-size:14px} .ex .scheme{color:var(--dim);font-size:10px;margin-top:2px}
  .flag{background:var(--accent);color:var(--bg);font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 7px;white-space:nowrap}
  .ex .last{color:var(--faint);font-size:10px;margin-top:8px}
  .setgrid{display:grid;grid-template-columns:20px 1fr 1fr;gap:6px;margin-top:10px;align-items:center}
  .setgrid .h{color:var(--faint);font-size:9px;letter-spacing:1px;text-transform:uppercase}
  .setgrid input{padding:6px;text-align:center;font-size:13px}
  .setgrid input.hit{color:var(--good);border-color:var(--good)}
  .setgrid .idx{color:var(--dim);font-size:12px}

  .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .frame{aspect-ratio:3/4;border:1px solid var(--line2);background:repeating-linear-gradient(135deg,#0a0a0a 0 8px,#0d0d0d 8px 16px);
    display:flex;align-items:flex-end;overflow:hidden;position:relative;cursor:pointer}
  .frame img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .frame span{font-size:9px;color:var(--dim);letter-spacing:1px;padding:6px;z-index:1;position:relative}

  svg{display:block}

  /* coach */
  .chat{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
  .msg{padding:10px 12px;border:1px solid var(--line);font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .msg.user{border-color:var(--line2);background:var(--surface2);align-self:flex-end;max-width:88%}
  .msg.assistant{border-left:2px solid var(--accent);background:var(--surface);align-self:flex-start;max-width:95%}
  .msg.sys{border-color:var(--warn);color:var(--warn);font-size:11px}
  .composer{display:flex;gap:8px;align-items:flex-end;position:sticky;bottom:0;background:var(--bg);padding-top:8px}
  .composer textarea{resize:none;min-height:44px;max-height:140px}
  .composer .btn{width:auto;padding:12px 16px}

  /* bottom nav */
  nav.tabbar{flex:0 0 auto;height:58px;border-top:1px solid var(--line);display:flex;position:sticky;bottom:0;background:var(--bg)}
  nav.tabbar button{flex:1;background:none;border:0;color:var(--faint);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;cursor:pointer}
  nav.tabbar button .g{font-size:15px} nav.tabbar button .t{font-size:8px;letter-spacing:1.5px}
  nav.tabbar button[aria-pressed="true"]{color:var(--accent)}

  .op{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--surface);padding:12px;margin-bottom:8px}
  .op.active{border-color:var(--accent)} .op .nm{flex:1} .op.active .nm b{color:var(--accent)}
  .op .nm span{display:block;color:var(--dim);font-size:10px;margin-top:2px}

  .pillrow{display:flex;gap:8px} .pillrow .p2{flex:1;border:1px solid var(--line);background:var(--surface2);color:var(--dim);
    font-size:11px;font-weight:700;padding:9px 0;text-align:center;cursor:pointer;letter-spacing:1px}
  .pillrow .p2[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--bg)}
  .dayrow{display:flex;gap:6px} .dayrow .d{flex:1;aspect-ratio:1;border:1px solid var(--line);background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer}
  .dayrow .d.on{background:var(--accent);border-color:var(--accent);color:var(--bg)}
  .check{width:14px;height:14px;border:1px solid var(--line2);display:inline-block;vertical-align:middle}
  .check.on{background:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
  <header class="app">
    <div class="title" id="scr-title">LEAN.SYS</div>
    <div class="pills" id="pills"></div>
  </header>
  <main class="screen" id="screen" tabindex="-1"></main>
  <nav class="tabbar" id="tabbar"></nav>

<script>
"use strict";
/* ============================ LEAN.SYS — local-first web build ============================
   Two operators. All data persists in this browser (localStorage; photos in IndexedDB).
   COACH talks to Claude via the Anthropic API using YOUR api key (stored locally, sent only
   to api.anthropic.com). No server, no accounts. This is the recomp protocol, not a platform.
========================================================================================== */

// ---------- domain ----------
function targets(p){
  const base = 10*p.w + 6.25*p.h - 5*p.age;
  const bmr = p.sex==='male' ? base+5 : base-161;
  const maint = bmr*p.act;
  return { bmr:Math.round(bmr), maint:Math.round(maint), cut:Math.round(maint-p.def), protein:Math.round(p.w*1.9) };
}
const SPLIT_FREE = {
  A:[['Goblet / leg press','3x8-10'],['DB bench press','3x8-10'],['Lat pulldown','3x10'],
     ['Seated cable row','3x10','posture'],['DB shoulder press','3x10'],['Plank','3x40s']],
  B:[['Romanian deadlift','3x8-10'],['One-arm DB row','3x10'],['Incline DB press','3x10'],
     ['Face pulls','3x15','fixes rounded shoulders'],['Leg curl','3x12'],['Hanging knee raise','3x12']],
  C:[['Deadlift / trap-bar','3x6-8'],['Pull-up / assisted','3xmax'],['Flat DB bench','3x10'],
     ['Bulgarian split squat','3x10/leg'],['Lateral raise','3x15'],['Cable crunch','3x15']],
};
const SPLIT_MACH = {
  A:[['Leg press','3x8-10'],['Chest press machine','3x8-10'],['Lat pulldown','3x10'],
     ['Seated cable row','3x10','posture'],['Shoulder press machine','3x10'],['Plank','3x40s']],
  B:[['Leg curl + back extension','3x10'],['Seated cable row','3x10'],['Incline chest press machine','3x10'],
     ['Face pulls','3x15','fixes rounded shoulders'],['Leg curl','3x12'],['Captain’s chair knee raise','3x12']],
  C:[['Leg press','3x8'],['Assisted pull-up / lat pulldown','3x10'],['Chest press machine','3x10'],
     ['Leg press','3x12'],['Lateral raise machine','3x15'],['Cable crunch','3x15']],
};
const SEED_FOODS=[['Chicken thigh 150g',290,38],['Rice 200g',260,5],['3 eggs',210,18],['Quark 250g',170,30],['Protein shake',130,25]];
const PLATE=['1 palm+ protein','1 fist carb (2 on train days)','2 handfuls veg','1 thumb fat'];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const STEP_GOAL=8000;
const DEFAULT_MISSION='So I can still run and play with my kids in 10 years.';
const FACTS=[
  "You're not training for a beach photo. You're training to still get off the floor with your kids in 10 years.",
  "Muscle is your retirement account for movement — build it now, spend it at 70.",
  "Grip strength and leg strength predict how independent you'll be at 80. You're banking it today.",
  "Every session you keep is a session your future self gets to run, lift, and play.",
  "Protein protects the muscle you're building — it's the line between losing fat and losing yourself.",
  "Consistency beats intensity: 3 sessions a week for a year is 156 votes for who you're becoming.",
  "The scale lies during a recomp — muscle up, fat down, weight flat. The photos tell the truth.",
  "Walking 8–10k steps a day is the cheapest longevity drug there is.",
  "Sleep is when muscle is actually built. The cortisol from bad sleep is what holds the belly fat.",
  "Strong parents raise kids who see strength as normal. You're setting the baseline for them too.",
];

// ---------- persistence ----------
const KEY='leansys.v1';
function blankData(){ return { food:{}, savedFoods:SEED_FOODS.map(f=>({name:f[0],kcal:f[1],protein:f[2]})),
  weight:[], lifts:{}, sessions:[], coach:[] }; }
function defaultState(){
  return {
    activeId:'op1',
    apiKey:'', model:'claude-opus-4-8',
    operators:{
      op1:{id:'op1',name:'Operator 1',sex:'male',h:197,w:95,age:36,act:1.375,def:300,equip:'free_weights',gymDays:['Mon','Wed','Fri'],mission:DEFAULT_MISSION},
      op2:{id:'op2',name:'Operator 2',sex:'female',h:170,w:65,age:34,act:1.375,def:300,equip:'free_weights',gymDays:['Tue','Thu','Sat'],mission:DEFAULT_MISSION},
    },
    data:{ op1:blankData(), op2:blankData() },
  };
}
let S;
function load(){
  try{ const raw=localStorage.getItem(KEY); S = raw? JSON.parse(raw): defaultState(); }
  catch(e){ S=defaultState(); }
  // migrate-safety
  if(!S.operators||!S.data){ S=defaultState(); }
  for(const id of Object.keys(S.operators)){ if(!S.data[id]) S.data[id]=blankData(); if(!S.operators[id].mission) S.operators[id].mission=DEFAULT_MISSION; }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){ alert('Storage full or blocked: '+e.message); } }
function op(){ return S.operators[S.activeId]; }
function d(){ return S.data[S.activeId]; }
function iso(dt){ dt=dt||new Date(); const y=dt.getFullYear(),m=String(dt.getMonth()+1).padStart(2,'0'),da=String(dt.getDate()).padStart(2,'0'); return `${y}-${m}-${da}`; }
function today(){ return iso(); }
function shortDate(s){ const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const [y,m,da]=s.split('-').map(Number); return `${da} ${M[m-1]}`; }
function weekdayOf(s){ const [y,m,da]=s.split('-').map(Number); const js=new Date(y,m-1,da).getDay(); return DAYS[js===0?6:js-1]; }

// ---------- IndexedDB (photos) ----------
let _db=null;
function db(){ return new Promise((res,rej)=>{ if(_db) return res(_db);
  const r=indexedDB.open('leansys-photos',1);
  r.onupgradeneeded=()=>{ const store=r.result.createObjectStore('photos',{keyPath:'id'}); store.createIndex('op','opId'); };
  r.onsuccess=()=>{ _db=r.result; res(_db); }; r.onerror=()=>rej(r.error); }); }
async function photoPut(rec){ const x=await db(); return new Promise((res,rej)=>{ const t=x.transaction('photos','readwrite'); t.objectStore('photos').put(rec); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function photoDel(id){ const x=await db(); return new Promise((res,rej)=>{ const t=x.transaction('photos','readwrite'); t.objectStore('photos').delete(id); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function photoAll(opId){ const x=await db(); return new Promise((res,rej)=>{ const out=[]; const t=x.transaction('photos','readonly');
  const idx=t.objectStore('photos').index('op'); const rq=idx.openCursor(IDBKeyRange.only(opId));
  rq.onsuccess=()=>{ const c=rq.result; if(c){ out.push(c.value); c.continue(); } else res(out); }; rq.onerror=()=>rej(rq.error); }); }

// ---------- helpers ----------
const el=(h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct=(v,t)=>Math.max(0,Math.min(100,t>0?(v/t)*100:0));
const num=(v)=>{const n=Number(v);return Number.isFinite(n)?n:0;};

function dayTotals(dateStr){ const list=(d().food[dateStr]||[]); return list.reduce((a,f)=>{a.kcal+=f.kcal;a.protein+=f.protein;return a;},{kcal:0,protein:0}); }
function completedCount(){ return d().sessions.length; }
function nextDay(){ return ['A','B','C'][completedCount()%3]; }
function sessionDone(dateStr){ return d().sessions.some(s=>s.date===dateStr); }
function splitFor(o){ return o.equip==='machines_only'?SPLIT_MACH:SPLIT_FREE; }
function parseTop(scheme){ if(/max|s$/i.test(scheme.split('x')[1]||'')) return null; const m=(scheme.split('x')[1]||'').match(/\d+/g); if(!m) return null; return Number(m[m.length-1]); }
function lastSession(exId, beforeDate){ const dates=Object.keys(d().lifts).filter(dt=>dt<beforeDate && (d().lifts[dt][exId]||[]).length).sort(); const dt=dates[dates.length-1]; return dt?{date:dt,sets:d().lifts[dt][exId]}:null; }

// ---------- state ----------
let view={ tab:'home', trainDay:null };
const TABS=[['home','▚','HOME'],['fuel','◇','FUEL'],['train','≡','TRAIN'],['body','◱','BODY'],['coach','◈','COACH'],['sys','※','SYS']];

// ---------- charts ----------
function trendSvg(data){
  const w=520,h=140,pl=32,pr=8,pt=12,pb=18;
  if(data.length<2) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="140"><text x="${w/2}" y="${h/2}" fill="var(--faint)" font-family="var(--mono)" font-size="12" text-anchor="middle">NEED 2+ WEIGH-INS FOR A TREND</text></svg>`;
  const kg=data.map(p=>p.kg); const min=Math.min(...kg)-0.5,max=Math.max(...kg)+0.5,span=(max-min)||1;
  const x=i=>pl+(i/(data.length-1))*(w-pl-pr); const y=v=>pt+(1-(v-min)/span)*(h-pt-pb);
  const path=data.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(p.kg).toFixed(1)).join(' ');
  const dots=data.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.kg).toFixed(1)}" r="2.2" fill="var(--accent)"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="140">
    <line x1="${pl}" y1="${h-pb}" x2="${w-pr}" y2="${h-pb}" stroke="var(--line)"/>
    <text x="2" y="${(y(max)+4).toFixed(0)}" fill="var(--faint)" font-family="var(--mono)" font-size="9">${max.toFixed(0)}</text>
    <text x="2" y="${(y(min)+4).toFixed(0)}" fill="var(--faint)" font-family="var(--mono)" font-size="9">${min.toFixed(0)}</text>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5"/>${dots}</svg>`;
}

// ============================ GAMIFICATION + TIME-LAPSE ============================
function allLogDates(){ const s=new Set(); d().weight.forEach(w=>s.add(w.date)); d().sessions.forEach(x=>s.add(x.date));
  Object.keys(d().food).forEach(k=>{ if((d().food[k]||[]).length) s.add(k); }); return [...s].sort(); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function weeksIn(extraFirst){ const ds=allLogDates(); let first=ds[0]; if(extraFirst&&(!first||extraFirst<first)) first=extraFirst;
  if(!first) return 0; return Math.max(1,Math.floor(daysBetween(first,today())/7)+1); }
function proteinStreak(){ const target=targets(op()).protein; let streak=0; const day=new Date(today());
  for(let i=0;i<400;i++){ const ds=iso(day); const hit=dayTotals(ds).protein>=target && target>0;
    if(i===0 && !hit){ day.setDate(day.getDate()-1); continue; } // grace: today may not be logged yet
    if(hit){ streak++; day.setDate(day.getDate()-1); } else break; }
  return streak; }
function milestoneList(photoDates){
  const w=weeksIn(photoDates[0]), sess=d().sessions.length, ps=proteinStreak(), photos=photoDates.length;
  return [
    {label:'FIRST SHOT', on:photos>=1},
    {label:'BASELINE', on:photos>=1 && d().weight.length>=1},
    {label:'SIDE-BY-SIDE', on:photoDates.length>=2},
    {label:'4 WEEKS', on:w>=4},
    {label:'12 WEEKS', on:w>=12},
    {label:'10 SESSIONS', on:sess>=10},
    {label:'25 SESSIONS', on:sess>=25},
    {label:'PROTEIN ×7', on:ps>=7},
    {label:'PROTEIN ×30', on:ps>=30},
  ];
}

// ---- time-lapse reel ----
let reel={angle:'front',rows:[],frames:[],idx:0,playing:false,timer:null};
let factIdx=0;
function reelPause(){ if(reel.timer){ clearInterval(reel.timer); reel.timer=null; } reel.playing=false;
  const b=document.getElementById('reel-play'); if(b) b.textContent='▶ PLAY'; }
function setReelFrames(){
  const rows=reel.rows.filter(r=>r.angle===reel.angle).sort((a,b)=>a.date<b.date?-1:1);
  const first=rows[0]?rows[0].date:null;
  reel.frames=rows.map(r=>({dataUrl:r.dataUrl,date:r.date,kg:r.kg,week:first?Math.floor(daysBetween(first,r.date)/7)+1:1}));
  reel.idx=0;
}
function reelShow(i){ if(!reel.frames.length) return; reel.idx=(i+reel.frames.length)%reel.frames.length;
  const f=reel.frames[reel.idx];
  const img=document.getElementById('reel-img'), cap=document.getElementById('reel-cap'), sc=document.getElementById('reel-scrub');
  if(img) img.src=f.dataUrl; if(sc) sc.value=reel.idx;
  if(cap){ const tag=reel.idx===0?'START':(reel.idx===reel.frames.length-1?'NOW':''); cap.textContent=`${tag?tag+' · ':''}WEEK ${f.week} · ${shortDate(f.date)}${f.kg?(' · '+f.kg+'kg'):''}`; }
}
function reelToggle(){ if(reel.playing){ reelPause(); return; } if(reel.frames.length<2) return;
  reel.playing=true; const b=document.getElementById('reel-play'); if(b) b.textContent='▮▮ PAUSE';
  reel.timer=setInterval(()=>reelShow(reel.idx+1),700); }

  const rows=await photoAll(S.activeId);
  // fill capture row with today's shots
  const t=today();
  ['front','side','relaxed'].forEach(a=>{
    const p=rows.find(r=>r.date===t&&r.angle===a);
    const cell=document.querySelector(`[data-shoot="${a}"]`);
    if(cell&&p) cell.innerHTML=`<img src="${p.dataUrl}"/><span>${a.toUpperCase()}</span>`;
  });
  const dates=[...new Set(rows.map(r=>r.date))].sort().reverse();
  if(!dates.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML=`<div class="label" style="margin-top:16px">History (hold to delete)</div>`+dates.map(dt=>{
    const w=rows.find(r=>r.date===dt&&r.kg);
    return `<div style="margin-top:8px"><div class="dim" style="font-size:11px">${shortDate(dt)}${w&&w.kg?(' · '+w.kg+'kg'):''}</div>
      <div class="photos">${['front','side','relaxed'].map(a=>{const p=rows.find(r=>r.date===dt&&r.angle===a);
        return `<div class="frame" ${p?`data-delphoto="${p.id}"`:''}>${p?`<img src="${p.dataUrl}"/>`:`<span>${a[0].toUpperCase()}</span>`}</div>`;}).join('')}</div></div>`;
  }).join('');
}

// ============================ COACH (LLM) ============================
function buildCoachSystem(){
  const o=op(), t=targets(o), tot=dayTotals(today());
  const hist=d().weight.slice().sort((a,b)=>a.date<b.date?-1:1);
  const latest=hist[hist.length-1], first=hist[0];
  const change=(latest&&first)?(latest.kg-first.kg).toFixed(1):'n/a';
  return [
`You are the coach inside LEAN.SYS, a hard-coded personal recomp tracker. You advise ONE operator at a time and you speak plainly — terse, no cheerleading, no emoji, no hype. Dark HUD terminal tone.`,
`THE PROTOCOL (do not deviate):`,
`- Goal is body recomposition (build muscle, strip lower-belly fat slowly), NOT weight loss.`,
`- Priority order, always: protein → stay near calorie target → lift hard → walk → sleep.`,
`- Protein is the hero metric. Target = bodyweight_kg × 1.9.`,
`- Deficit stays EASY (≈300 kcal) or maintenance. NEVER recommend an aggressive deficit for this profile.`,
`- Training is a posture-biased A/B/C split, 3x/week. Progression: when all sets hit the top of the rep range, add weight next time.`,
`- Abs are built in training, revealed in the kitchen. The scale lies during a recomp — trust the photos and the trend.`,
`OPERATOR: ${o.name}, ${o.sex}, ${o.h}cm, ${o.w}kg, age ${o.age}, equipment ${o.equip}.`,
`TARGETS: maintenance ${t.maint} kcal, cut ${t.cut} kcal, protein ${t.protein} g/day. Weight change so far: ${change} kg.`,
`TODAY SO FAR: ${Math.round(tot.protein)}/${t.protein} g protein, ${Math.round(tot.kcal)} kcal eaten (target ${o.def>0?t.cut:t.maint}).`,
`Give specific, numeric, actionable answers grounded in these numbers. Keep replies short unless asked to go deep.`
  ].join('\n');
}

// downscale a File to a jpeg data URL (keeps API payload + IndexedDB light)
function fileToJpeg(file, max, quality){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(new Error('could not read file'));
    reader.onload=()=>{ const img=new Image();
      img.onerror=()=>rej(new Error('could not decode image'));
      img.onload=()=>{ let {width,height}=img; const sc=Math.min(1,max/Math.max(width,height));
        const c=document.createElement('canvas'); c.width=Math.round(width*sc); c.height=Math.round(height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',quality)); };
      img.src=reader.result; };
    reader.readAsDataURL(file);
  });
}

// Vision: estimate a meal's protein + calories from a photo.
async function estimateFoodFromPhoto(dataUrl){
  const b64=dataUrl.split(',')[1];
  const media=dataUrl.substring(5,dataUrl.indexOf(';')); // e.g. image/jpeg
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:S.model, max_tokens:400,
      system:'You estimate nutrition from a food photo for a protein-focused recomp tracker. Identify the food and estimate the visible portion. Protein grams is the priority — be realistic and lean toward known values for common foods. Reply with ONLY a JSON object and nothing else: {"name":"short label incl. rough portion","kcal":<integer>,"protein_g":<integer>,"note":"one short line on the portion/assumptions"}. If the image is not food, set kcal and protein_g to 0 and say so in note.',
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:media,data:b64}},
        {type:'text',text:'Estimate this meal. JSON only.'}
      ]}]
    })
  });
  const data=await res.json();
  if(!res.ok) throw new Error((data&&data.error&&data.error.message)||('HTTP '+res.status));
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const m=text.match(/\{[\s\S]*\}/); if(!m) throw new Error('could not parse the estimate');
  const obj=JSON.parse(m[0]);
  return { name:String(obj.name||'meal'), kcal:Math.round(num(obj.kcal)), protein:Math.round(num(obj.protein_g)), note:String(obj.note||'') };
}

async function askCoach(userText){
  const chatEl=document.getElementById('chat');
  d().coach.push({role:'user',content:userText});
  chatEl.appendChild(el(`<div class="msg user">${esc(userText)}</div>`));
  const thinking=el(`<div class="msg assistant dim">…</div>`); chatEl.appendChild(thinking); chatEl.scrollTop=chatEl.scrollHeight;
  save();
  try{
    const messages=d().coach.slice(-20).map(m=>({role:m.role,content:m.content}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:S.model,max_tokens:1024,system:buildCoachSystem(),messages})
    });
    const data=await res.json();
    if(!res.ok){ throw new Error((data&&data.error&&data.error.message)||('HTTP '+res.status)); }
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim()||'(no response)';
    d().coach.push({role:'assistant',content:text}); save();
    thinking.remove(); chatEl.appendChild(el(`<div class="msg assistant">${esc(text)}</div>`));
  }catch(err){
    thinking.remove();
    chatEl.appendChild(el(`<div class="msg sys">coach error: ${esc(err.message)}. Check your API key / model in SYS. (A 401 = bad key; a network/CORS error usually means the key or the direct-browser-access header was rejected.)</div>`));
  }
  chatEl.scrollTop=chatEl.scrollHeight;
}

// ============================ EVENTS ============================
document.body.addEventListener('click', async (e)=>{
  const T=e.target;
  const closest=(a)=>T.closest(a);

  // nav
  const pill=closest('[data-profile]'); if(pill){ S.activeId=pill.dataset.profile; save(); view.trainDay=null; render(); return; }
  const opRow=closest('[data-op]'); if(opRow){ S.activeId=opRow.dataset.op; save(); view.trainDay=null; render(); return; }
  const tab=closest('[data-tab]'); if(tab){ view.tab=tab.dataset.tab; if(view.tab!=='train') view.trainDay=null; render(); return; }
  if(T.id==='go-sys'){ view.tab='sys'; render(); return; }

  // fuel
  const quick=closest('[data-quick]'); if(quick){ const f=d().savedFoods[+quick.dataset.quick];
    (d().food[today()]=d().food[today()]||[]).push({name:f.name,kcal:f.kcal,protein:f.protein}); save(); render(); return; }
  const df=closest('[data-delfood]'); if(df){ d().food[today()].splice(+df.dataset.delfood,1); save(); render(); return; }
  if(T.id==='snap-food'){ if(!S.apiKey){ alert('Add your Anthropic API key in SYS first — the estimate uses the API.'); view.tab='sys'; render(); return; } document.getElementById('food-photo-input').click(); return; }
  if(T.id==='f-savechk'){ T.classList.toggle('on'); return; }
  if(T.id==='f-add'){
    const name=document.getElementById('f-name').value.trim();
    const prot=document.getElementById('f-prot').value.trim();
    if(!name||prot===''){ alert('Name and protein are required.'); return; }
    const kcal=num(document.getElementById('f-kcal').value), protein=num(prot);
    (d().food[today()]=d().food[today()]||[]).push({name,kcal,protein});
    if(document.getElementById('f-savechk').classList.contains('on')) d().savedFoods.push({name,kcal,protein});
    save(); render(); return;
  }

  // train
  const day=closest('[data-day]'); if(day){ view.trainDay=day.dataset.day; render(); return; }
  const ss=closest('[data-savesets]'); if(ss){
    const exId=ss.dataset.savesets; const box=closest('.ex');
    const ws=[...box.querySelectorAll('[data-w]')], rs=[...box.querySelectorAll('[data-r]')];
    const sets=[]; for(let k=0;k<ws.length;k++){ const w=ws[k].value.trim(),r=rs[k].value.trim(); if(w!==''||r!=='') sets.push({w:num(w),reps:num(r)}); }
    (d().lifts[today()]=d().lifts[today()]||{})[exId]=sets; save(); render(); return;
  }
  if(T.id==='mark-done'){ const day=view.trainDay||nextDay(); if(!sessionDone(today())) d().sessions.push({date:today(),day}); save(); render(); return; }

  // body
  if(T.id==='w-save'){ const kg=num(document.getElementById('w-kg').value); if(kg<=0){alert('Enter a weight.');return;}
    const t=today(); const ex=d().weight.find(w=>w.date===t); if(ex) ex.kg=kg; else d().weight.push({date:t,kg});
    op().w=kg; save(); render(); return; }
  const shoot=closest('[data-shoot]'); if(shoot){ window._shootAngle=shoot.dataset.shoot; document.getElementById('photo-input').click(); return; }
  if(T.id==='compare-link'){ openCompare(); return; }
  const rang=closest('[data-reelang]'); if(rang){ reelPause(); reel.angle=rang.dataset.reelang; setReelFrames(); paintJourney(); return; }
  if(T.id==='reel-play'){ reelToggle(); return; }
  if(closest('[data-fact-next]')){ factIdx=(factIdx+1)%FACTS.length; const ft=document.getElementById('fact-text'); if(ft) ft.textContent=FACTS[factIdx%FACTS.length]; return; }

  // sys
  const sex=closest('[data-sex]'); if(sex){ op().sex=sex.dataset.sex; save(); render(); return; }
  const eq=closest('[data-equip]'); if(eq){ op().equip=eq.dataset.equip; save(); render(); return; }
  const gd=closest('[data-gday]'); if(gd){ const dd=gd.dataset.gday; const g=op().gymDays;
    op().gymDays = g.includes(dd)? g.filter(x=>x!==dd) : DAYS.filter(x=>g.includes(x)||x===dd); save(); render(); return; }
  if(T.id==='p-save'){ const o=op();
    o.name=document.getElementById('p-name').value.trim()||o.name;
    o.h=num(document.getElementById('p-h').value)||o.h; o.w=num(document.getElementById('p-w').value)||o.w;
    o.age=num(document.getElementById('p-age').value)||o.age; o.act=num(document.getElementById('p-act').value)||o.act;
    o.def=num(document.getElementById('p-def').value);
    const mv=document.getElementById('p-mission').value.trim(); if(mv) o.mission=mv;
    save(); render(); return; }
  if(T.id==='api-save'){ S.apiKey=document.getElementById('api-key').value.trim(); S.model=document.getElementById('api-model').value; save(); alert('Saved. Coach is ready.'); render(); return; }
  if(T.id==='export'){ const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='leansys-backup-'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href); return; }
  if(T.id==='reset-op'){ if(confirm('Clear '+op().name+'’s log (food, lifts, weigh-ins, sessions, chat)? Keeps the profile.')){ S.data[S.activeId]=blankData(); save(); render(); } return; }

  // coach
  if(T.id==='coach-send'){ const box=document.getElementById('coach-input'); const v=box.value.trim(); if(!v) return; box.value=''; askCoach(v); return; }

  // delete photo (click after long-press flag)
});

// long-press to delete photo / saved food
let _lp=null;
document.body.addEventListener('pointerdown',(e)=>{
  const p=e.target.closest('[data-delphoto]'); const q=e.target.closest('[data-quick]');
  if(p){ _lp=setTimeout(async()=>{ if(confirm('Delete this photo?')){ await photoDel(p.dataset.delphoto); renderPhotoHist(); } },550); }
  else if(q){ _lp=setTimeout(()=>{ if(confirm('Delete this saved food?')){ d().savedFoods.splice(+q.dataset.quick,1); save(); render(); } },550); }
});
document.body.addEventListener('pointerup',()=>{ if(_lp){ clearTimeout(_lp); _lp=null; } });
document.body.addEventListener('pointerleave',()=>{ if(_lp){ clearTimeout(_lp); _lp=null; } });

// time-lapse scrubber
document.body.addEventListener('input',(e)=>{ if(e.target.id==='reel-scrub'){ reelPause(); reelShow(+e.target.value); } });

// coach: enter to send
document.body.addEventListener('keydown',(e)=>{
  if(e.target&&e.target.id==='coach-input'&&e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); const v=e.target.value.trim(); if(v){ e.target.value=''; askCoach(v); } }
});

// photo file inputs
document.body.addEventListener('change', async (e)=>{
  // BODY: progress photo → store in IndexedDB
  if(e.target.id==='photo-input'){
    const file=e.target.files[0]; e.target.value=''; if(!file) return;
    const angle=window._shootAngle||'front';
    try{
      const dataUrl=await fileToJpeg(file,1000,0.82);
      const latest=d().weight[d().weight.length-1];
      await photoPut({id:S.activeId+'-'+today()+'-'+angle+'-'+Date.now(),opId:S.activeId,date:today(),angle,dataUrl,kg:latest?latest.kg:null});
      renderPhotoHist();
    }catch(err){ alert('Photo failed: '+err.message); }
    return;
  }
  // FUEL: food photo → estimate protein via the API, prefill the log form
  if(e.target.id==='food-photo-input'){
    const file=e.target.files[0]; e.target.value=''; if(!file) return;
    const status=document.getElementById('snap-status');
    if(status){ status.style.color='var(--dim)'; status.textContent='analysing photo…'; }
    try{
      const dataUrl=await fileToJpeg(file,900,0.8);
      const est=await estimateFoodFromPhoto(dataUrl);
      const nameEl=document.getElementById('f-name'), kcalEl=document.getElementById('f-kcal'), protEl=document.getElementById('f-prot');
      if(nameEl) nameEl.value=est.name; if(kcalEl) kcalEl.value=est.kcal; if(protEl) protEl.value=est.protein;
      if(status){ status.style.color='var(--accent)'; status.textContent=`≈ ${est.protein} g protein · ${est.kcal} kcal — ${est.note} · review below, then Log it`; }
    }catch(err){
      if(status){ status.style.color='var(--bad)'; status.textContent='estimate failed: '+err.message+' (check API key/model in SYS)'; }
    }
    return;
  }
});

// ---------- compare overlay ----------
async function openCompare(){
  const rows=await photoAll(S.activeId);
  if(!rows.length){ alert('No photos yet.'); return; }
  const overlay=el(`<div style="position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column"></div>`);
  const angles=['front','side','relaxed'];
  let angle='front';
  function datesFor(a){ return [...new Set(rows.filter(r=>r.angle===a).map(r=>r.date))].sort(); }
  function draw(){
    const ds=datesFor(angle);
    const a=rows.find(r=>r.angle===angle&&r.date===ds[0]);
    const b=rows.find(r=>r.angle===angle&&r.date===ds[ds.length-1]);
    overlay.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--line)">
        <div class="title" style="font-size:16px">COMPARE</div><div class="dim" id="c-close" style="cursor:pointer">CLOSE ✕</div></div>
      <div style="display:flex;gap:5px;padding:10px 14px">${angles.map(x=>`<button class="p2" data-cang="${x}" aria-pressed="${x===angle}" style="border:1px solid ${x===angle?'var(--accent)':'var(--line)'};background:${x===angle?'var(--accent)':'var(--surface2)'};color:${x===angle?'var(--bg)':'var(--dim)'};flex:1;padding:8px 0;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer">${x.toUpperCase()}</button>`).join('')}</div>
      <div style="flex:1;display:flex;border-top:1px solid var(--line)">
        ${[['A',a],['B',b]].map(([lbl,p])=>`<div style="flex:1;display:flex;flex-direction:column;border-right:${lbl==='A'?'1px solid var(--line)':'0'}">
          <div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--line)"><span class="faint">${lbl}</span><span class="dim" style="font-size:10px">${p?shortDate(p.date)+(p.kg?(' · '+p.kg+'kg'):''):'—'}</span></div>
          <div style="flex:1;background:#000;position:relative">${p?`<img src="${p.dataUrl}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"/>`:`<div class="faint" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">NO PHOTO</div>`}</div></div>`).join('')}
      </div>
      <div class="faint" style="padding:12px 14px">Earliest vs latest at this angle. The scale lies during a recomp — the photos tell the truth.</div>`;
  }
  overlay.addEventListener('click',(e)=>{ if(e.target.id==='c-close'||e.target.closest('#c-close')){ overlay.remove(); return; }
    const ca=e.target.closest('[data-cang]'); if(ca){ angle=ca.dataset.cang; draw(); } });
  draw(); document.body.appendChild(overlay);
}
